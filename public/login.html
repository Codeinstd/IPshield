<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPShield — Login</title>
  <!-- Favicon metadata -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon.ico/favicon-96x96.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon.ico/favicon-16x16.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&amp;family=Syne:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<link rel="stylesheet" href="/leaflet.min.css">
<style>
  :root {
    --bg:         #080c0f;
    --bg1:        #0d1117;
    --bg2:        #111820;
    --bg3:        #162030;
    --border:     #1e2d3d;
    --border2:    #243447;
    --accent:     #02bfe0 ;
    --accent2:    #0099cc;
    --text:       #c9d8e8;
    --text2:      #6a8fa8;
    --text3:      #3d5a72;
    --critical:   #ff3355;
    --high:       #ff7700;
    --medium:     #ffcc00;
    --low:        #01cd6e;
    --info:       #00d9ff;
    --glow-c:     0 0 20px rgba(255,51,85,0.4);
    --glow-h:     0 0 20px rgba(255,119,0,0.4);
    --glow-m:     0 0 20px rgba(255,204,0,0.3);
    --glow-l:     0 0 20px rgba(0,232,124,0.3);
    --glow-a:     0 0 20px rgba(0,217,255,0.25);
    --panel:    rgba(13, 17, 23, 0.72);
    --panel-border: rgba(255, 255, 255, 0.06); 
    --shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
    --radius: 18px;
  }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: 'Segoe UI', system-ui, monospace;
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .logo { display: flex; align-items: center; gap: 12px; }
      .logo-icon {
        width: 32px; height: 32px;
        border: 2px solid var(--accent); border-radius: 6px;
        display: flex; align-items: center; justify-content: center;
        color: var(--accent); font-size: 18px; font-weight: 700;
        box-shadow: var(--glow-a);
        animation: pulse-border 3s ease-in-out infinite;
      }

      .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
      .logo-text span { color: var(--accent); }
      .logo-sub { font-size: 10px; color: var(--text3); letter-spacing: 3px; margin-top: 1px; }

    .logo {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #c9d8e8;
      letter-spacing: 1px;
    }
    .logo span { color: #00d9ff; }

    label {
      display: block;
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 6px;
      /* text-transform: uppercase; */
      letter-spacing: 0.5px;
      font-family: 'JetBrains Mono', monospace;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'JetBrains Mono', monospace;
    }
    input:focus { border-color: #00d9ff; }

    button#login-submit {
      width: 100%;
      padding: 11px;
      background: #00d9ff;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      font-family: 'JetBrains Mono', monospace;
    }
    button#login-submit:hover    { opacity: 0.88; }
    button#login-submit:disabled { opacity: 0.5; cursor: not-allowed; }


    #login-error {
      display: none;
      background: #2d1b1b;
      border: 1px solid #6e2020;
      color: #ff6b6b;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      font-family: 'Syne' sans-serif;
    }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: #3d4451;
      font-family: 'JetBrains Mono', monospace;
    }

    .loading-screen {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: #0d1117;
    z-index: 99999;
  }

    .loading-screen.show {
      display: flex;
    }

    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      animation: fadeIn 0.5s ease;
      gap: 10px;
    }

    .loader-animation {
      width: 180px;
      height: 180px;
    }

    .loading-content h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .loading-content p {
      margin: 0;
      color: #cbd5e1;
    }

    .loading-content {
      transform: translateY(-10px);
    }

   

/* @keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes float {
  0%,100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-10px);
  }
} */


</style>
</head>
<body>
  <div id="loginStep" class="card">
    <div class="logo">
    <div class="logo-icon">⬡</div>
    <div>
      <div class="logo-text">IP<span>Shield</span></div>
      <div class="logo-sub">Risk Intelligence</div>
    </div>
  </div>

    <div>
      <label for="auth-email">Email</label>
      <input id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div>
      <label for="auth-password">Password</label>
      <input id="auth-password" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <div id="login-error"></div>

    <button id="login-submit">Sign in</button>
    <!-- <p class="footer-note">IPShield Admin Console</p> -->

    <!-- MFA step — hidden until needed -->
<div id="mfaStep" style="display:none;">
  <div style="text-align:center;margin-bottom:24px;">
    <div style="font-size:32px;margin-bottom:12px;">🔐</div>
    <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px;">
      Two-Factor Authentication
    </div>
    <div style="font-size:12px;color:var(--text2);line-height:1.7;">
      Enter the 6-digit code from your authenticator app
    </div>
  </div>

  <div id="mfaError" style="display:none;padding:10px 14px;background:rgba(255,51,85,0.1);
    border:1px solid rgba(255,51,85,0.3);border-radius:8px;font-size:12px;
    color:var(--critical);margin-bottom:16px;"></div>

  <div style="margin-bottom:20px;">
    <label style="display:block;font-size:10px;color:var(--text3);
      letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">
      Authenticator Code
    </label>
    <input type="text" id="mfaCode"
      placeholder="000 000"
      maxlength="7"
      inputmode="numeric"
      autocomplete="one-time-code"
      style="width:100%;padding:14px;background:var(--bg2);border:1px solid var(--border);
        border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;
        font-size:24px;outline:none;text-align:center;letter-spacing:8px;">
  </div>

  <button id="mfaBtn" onclick="handleMFA()"
    style="width:100%;padding:13px;border-radius:8px;border:none;cursor:pointer;
      font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;
      letter-spacing:1px;text-transform:uppercase;background:var(--accent);
      color:#000;margin-bottom:12px;">
    Verify →
  </button>

  <button onclick="showLoginStep()"
    style="width:100%;padding:10px;border-radius:8px;background:transparent;
      color:var(--text2);border:1px solid var(--border);
      font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;">
    ← Back to login
  </button>
</div>

  </div>

  <div id="loadingScreen" class="loading-screen">
  <div class="loading-content">

    <div id="lottieLoader" class="loader-animation"></div>

    <h1 style="font-family: 'Syne', sans-serif;">Signing you in</h1>
    <p id="loadingText" style="font-family:'JetBrains Mono', monospace; font-size: small;">Verifying credentials...</p>

  </div>
</div>

<script>
const loginBtn = document.getElementById("login-submit");
const emailEl = document.getElementById("auth-email");
const passwordEl = document.getElementById("auth-password");

  let mfaSubmitting = false;

  async function handleLogin(e) {
    e?.preventDefault();

    const errEl = document.getElementById("login-error");
    const btn = document.getElementById("login-submit");

    const email = emailEl.value.trim().toLowerCase();
    const password = passwordEl.value;

    errEl.style.display = "none";

    if (!email || !password) {
      errEl.textContent = "Email and password are required.";
      errEl.style.display = "block";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Signing in…";

    try {
      const res = await fetch("/api/v1/auth/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email,
          password
        })
      });

      let data = {};

      try {
        data = await res.json();
      } catch {
        data = {};
      }

      if (!res.ok) {
        errEl.textContent = data.error || "Login failed";
        errEl.style.display = "block";

        btn.disabled = false;
        btn.textContent = "Sign In →";
        return;
      }

      // MFA Required
      if (data.mfaRequired) {
        if (!data.challengeToken) {
          errEl.textContent = "Authentication error. Please try again.";
          errEl.style.display = "block";

          btn.disabled = false;
          btn.textContent = "Sign In →";
          return;
        }

        sessionStorage.setItem(
          "mfa_challenge",
          data.challengeToken
        );

        showMFAStep();

        btn.disabled = false;
        btn.textContent = "Sign In →";
        return;
      }

      // Success
      if (data.token) {
        localStorage.setItem("token", data.token);
      }

      if (data.user) {
        localStorage.setItem(
          "user",
          JSON.stringify(data.user)
        );
      }

      window.location.href = "/dashboard";

    } catch (err) {
      console.error("Login error:", err);

      errEl.textContent =
        "Network error. Please try again.";

      errEl.style.display = "block";

      btn.disabled = false;
      btn.textContent = "Sign In →";
    }
  }

  function showMFAStep() {
    document.getElementById("loginStep").style.display = "none";
    document.getElementById("mfaStep").style.display = "block";

    const input = document.getElementById("mfaCode");
    input?.focus();
  }

  function showLoginStep() {
    document.getElementById("mfaStep").style.display = "none";
    document.getElementById("loginStep").style.display = "block";

    sessionStorage.removeItem("mfa_challenge");
  }

  async function handleMFA() {
    if (mfaSubmitting) return;

    const errEl = document.getElementById("mfaError");
    const btn = document.getElementById("mfaBtn");
    const input = document.getElementById("mfaCode");

    const code = input.value.trim().replace(/\s/g, "");
    const challenge = sessionStorage.getItem("mfa_challenge");

    errEl.style.display = "none";

    if (!/^\d{6}$/.test(code)) {
      errEl.textContent =
        "Enter a valid 6-digit code from your authenticator app.";

      errEl.style.display = "block";
      return;
    }

    if (!challenge) {
      errEl.textContent =
        "Session expired. Please log in again.";

      errEl.style.display = "block";

      showLoginStep();
      return;
    }

    mfaSubmitting = true;

    btn.disabled = true;
    btn.textContent = "Verifying…";

    try {
      const res = await fetch("/api/v1/auth/login/mfa", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          challengeToken: challenge,
          totpToken: code
        })
      });

      let data = {};

      try {
        data = await res.json();
      } catch {
        data = {};
      }

      if (!res.ok) {
        errEl.textContent =
          data.error || "Invalid verification code";

        errEl.style.display = "block";

        input.value = "";
        input.focus();

        btn.disabled = false;
        btn.textContent = "Verify →";

        return;
      }

      sessionStorage.removeItem("mfa_challenge");

      if (data.token) {
        localStorage.setItem("token", data.token);
      }

      if (data.user) {
        localStorage.setItem(
          "user",
          JSON.stringify(data.user)
        );
      }

      window.location.href = "/dashboard";

    } catch (err) {
      console.error("MFA error:", err);

      errEl.textContent =
        "Network error. Please try again.";

      errEl.style.display = "block";

      btn.disabled = false;
      btn.textContent = "Verify →";

    } finally {
      mfaSubmitting = false;
    }
  }

  // Login button
  loginBtn?.addEventListener("click", handleLogin);

  // Enter submits login
  [emailEl, passwordEl].forEach(el => {
    el?.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        handleLogin(e);
      }
    });
  });

  // MFA auto-submit at 6 digits
  document
    .getElementById("mfaCode")
    ?.addEventListener("input", function () {
      const digits = this.value.replace(/\D/g, "");

      this.value = digits;

      if (digits.length === 6) {
        handleMFA();
      }
    });

  // Enter submits MFA
  document
    .getElementById("mfaCode")
    ?.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        handleMFA();
      }
    });
</script>
 <script>
    const anim = lottie.loadAnimation({
      container: document.getElementById('lottieLoader'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: '/animations/loading.json'
    });
</script>
</body>
</html>
