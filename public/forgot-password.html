<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPShield — Forgot Password</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon.ico/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon.ico/favicon-16x16.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1:      #0d1117;
      --bg2:      #111820;
      --border:   #1e2d3d;
      --accent:   #02bfe0;
      --text:     #c9d8e8;
      --text2:    #6a8fa8;
      --text3:    #3d5a72;
      --critical: #ff3355;
      --low:      #01cd6e;
      --glow-a:   0 0 20px rgba(0,217,255,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg1);
      font-family: 'Segoe UI', system-ui, monospace;
      padding: 24px;
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .logo            { display: flex; align-items: center; gap: 12px; }
    .logo-icon       {
      width: 32px; height: 32px;
      border: 2px solid var(--accent); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 18px; font-weight: 700;
      box-shadow: var(--glow-a);
    }
    .logo-text       { font-family: 'Syne', sans-serif; font-weight: 800;
                       font-size: 22px; letter-spacing: -0.5px; color: white; }
    .logo-text span  { color: var(--accent); }
    .logo-sub        { font-size: 10px; color: var(--text3); letter-spacing: 3px; margin-top: 1px; }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
    }
    .page-sub {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.7;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      font-family: 'JetBrains Mono', monospace;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'JetBrains Mono', monospace;
    }
    input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      font-family: 'JetBrains Mono', monospace;
    }
    .btn-primary:hover    { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-box {
      display: none;
      background: rgba(255,51,85,0.1);
      border: 1px solid rgba(255,51,85,0.3);
      color: #ff6b6b;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }

    .success-box {
      display: none;
      background: rgba(1,205,110,0.08);
      border: 1px solid rgba(1,205,110,0.25);
      color: var(--low);
      border-radius: 8px;
      padding: 16px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.7;
      text-align: center;
    }

    .back-link {
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
    }
    .back-link a {
      color: var(--accent);
      text-decoration: none;
    }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <div>
      <div class="logo-text">IP<span>Shield</span></div>
      <div class="logo-sub">Risk Intelligence</div>
    </div>
  </div>

  <div>
    <div class="page-title">Forgot Password</div>
    <div class="page-sub">
      Enter your account email and we'll send you a reset link.
    </div>
  </div>

  <div id="errorBox" class="error-box"></div>
  <div id="successBox" class="success-box"></div>

  <div id="formBody">
    <div style="margin-bottom:16px;">
      <label for="resetEmail">Email</label>
      <input id="resetEmail" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <button id="resetBtn" class="btn-primary">Send Reset Link</button>
  </div>

  <div class="back-link">
    <a href="/login">← Back to sign in</a>
  </div>
</div>

<script>
  const btn      = document.getElementById("resetBtn");
  const emailEl  = document.getElementById("resetEmail");
  const errBox   = document.getElementById("errorBox");
  const succBox  = document.getElementById("successBox");
  const formBody = document.getElementById("formBody");

  async function handleReset() {
    const email = emailEl.value.trim().toLowerCase();

    errBox.style.display  = "none";
    succBox.style.display = "none";

    if (!email || !email.includes("@")) {
      errBox.textContent   = "Enter a valid email address.";
      errBox.style.display = "block";
      return;
    }

    btn.disabled    = true;
    btn.textContent = "Sending…";

    try {
      const res  = await fetch("/api/v1/auth/forgot-password", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email }),
      });
      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        errBox.textContent   = data.error || "Something went wrong. Please try again.";
        errBox.style.display = "block";
        btn.disabled         = false;
        btn.textContent      = "Send Reset Link";
        return;
      }

      // Hide form, show success — same message regardless of whether email exists
      formBody.style.display = "none";
      succBox.innerHTML = `
        ✓ If an account exists for <strong>${email}</strong>,
        a reset link has been sent.<br><br>
        Check your inbox — the link expires in 1 hour.
      `;
      succBox.style.display = "block";

    } catch {
      errBox.textContent   = "Network error. Please try again.";
      errBox.style.display = "block";
      btn.disabled         = false;
      btn.textContent      = "Send Reset Link";
    }
  }

  btn.addEventListener("click", handleReset);
  emailEl.addEventListener("keydown", e => { if (e.key === "Enter") handleReset(); });
</script>
</body>
</html>
