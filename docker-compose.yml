
version: "3.9"
services:
  app:
    build: ./backend
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgres://ipshield:secret@db:5432/ipshield
      REDIS_URL: redis://redis:6379
      JWT_SECRET: changeme
      APP_URL: http://localhost:3000
    depends_on: [db, redis]

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ipshield
      POSTGRES_USER: ipshield
      POSTGRES_PASSWORD: secret
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    volumes: [redisdata:/data]

volumes:
  pgdata:
  redisdata: